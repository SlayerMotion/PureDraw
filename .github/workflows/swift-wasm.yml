name: Swift (WASM)

# Include only if the package builds for wasm32-unknown-wasip1
# (git-discipline.md Rule 8.3). Code that needs Foundation networking, threads,
# or other WASI-absent surface does not get a WASM badge. This is a BUILD gate;
# running wasm tests needs a separate runtime and is out of scope. Delete this
# workflow and its README badge if the package does not support WASM.
#
# Uses swiftly + the official swift.org wasm SDK. Update the toolchain version,
# SDK URL, and checksum to the current release when you bump Swift.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift-wasm:
    name: Swift (WASM)
    runs-on: ubuntu-latest
    container: swift:6.0.3
    steps:
      - uses: actions/checkout@v4
      - name: Install WebAssembly SDK
        run: |
          apt-get update && apt-get install -y curl
          curl -fL -o sdk.artifactbundle.zip https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.0.3-RELEASE/swift-wasm-6.0.3-RELEASE-wasm32-unknown-wasi.artifactbundle.zip
          swift sdk install sdk.artifactbundle.zip
      - name: Build for WebAssembly
        run: |
          if [ ! -f Package.swift ]; then
            echo "No Package.swift yet; skipping WASM build."
            exit 0
          fi
          swift build --swift-sdk wasm32-unknown-wasip1
          swift build -c release --swift-sdk wasm32-unknown-wasip1
