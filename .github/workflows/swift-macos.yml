name: Swift (macOS)

# Apple-platform builds and any UI build/test run on macOS runners only
# (git-discipline.md Rule 8.3). Keep this workflow; add a swift-ios.yml (also
# runs-on: macos) if the repo ships an iOS/visionOS UI target.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift-macos:
    name: Swift (macOS)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Format, lint, build, test
        run: |
          if [ ! -f Package.swift ]; then
            echo "No Package.swift yet; skipping Swift gates."
            exit 0
          fi
          brew install swiftformat swiftlint
          swiftformat . --config .swiftformat --lint
          swiftlint --config .swiftlint.yml --strict
          swift build && swift test
